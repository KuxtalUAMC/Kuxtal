services:
  db:
    image: postgres:15
    container_name: kuxtal_db
    restart: always
    environment:
      POSTGRES_USER: user_kuxtal
      POSTGRES_PASSWORD: password_safe
      POSTGRES_DB: kuxtal_db
    ports:
      - "5433:5432"
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data

  server:
    build: ./server
    container_name: kuxtal_server
    ports:
      - "4000:4000"
    env_file:
      - ./server/.env
    volumes:
      - ./server:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - db

  client:
    build: ./client
    container_name: kuxtal_client
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    volumes:
      - ./client:/usr/src/app
      - client_node_modules:/usr/src/app/node_modules
    stdin_open: true
    tty: true
    depends_on:
      - server

volumes:
  postgres_data:
  client_node_modules:
